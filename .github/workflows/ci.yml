name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow a later push to cancel an in-progress run on the same branch — saves
# minutes during quick fix-up commits while a previous run is still going.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Stub env vars for the build. These are NOT secrets — they exist only so
# `lib/env.ts`'s zod schema parses at import time (Next compiles every app
# route, which imports `env`). Real values are wired in Vercel for runtime.
# CI never connects to Supabase.
env:
  NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
  SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
  NEXT_PUBLIC_COACH_WHATSAPP: '441234567890'
  NEXT_PUBLIC_COACH_CALENDLY: https://calendly.com/stub

jobs:
  verify:
    name: lint · typecheck · format · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Next.js)
        run: npm run build

  e2e:
    name: e2e smoke (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    # Skip on Dependabot PRs — they don't need browsers and would burn minutes.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
